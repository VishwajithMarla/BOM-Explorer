<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors *">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Level BOM Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 24px 32px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header .subtitle { font-size: 13px; opacity: 0.8; }

  .controls { display: flex; gap: 12px; align-items: center; padding: 16px 32px; background: white; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
  .controls input[type="text"] { padding: 8px 14px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 14px; width: 280px; outline: none; transition: border-color 0.2s; }
  .controls input[type="text"]:focus { border-color: #0f3460; }
  .controls button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #0f3460; color: white; }
  .btn-primary:hover { background: #1a4a7a; }
  .btn-secondary { background: #e8e8e8; color: #333; }
  .btn-secondary:hover { background: #d0d0d0; }
  .stats { margin-left: auto; font-size: 13px; color: #666; display: flex; gap: 16px; }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .stat-dot.fg { background: #0f3460; }
  .stat-dot.sub { background: #e76f51; }
  .stat-dot.raw { background: #2a9d8f; }

  .tabs { display: flex; gap: 2px; padding: 0 32px; background: white; border-bottom: 1px solid #e0e0e0; }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab:hover { color: #333; }
  .tab.active { color: #0f3460; border-bottom-color: #0f3460; }

  .content { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  .fg-card { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; transition: box-shadow 0.2s; }
  .fg-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .fg-card.hidden { display: none; }

  .fg-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
  .fg-header:hover { background: #f8f9fa; }

  .fg-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; }
  .fg-icon.top { background: linear-gradient(135deg, #0f3460, #1a5a9a); }
  .fg-icon.sub { background: linear-gradient(135deg, #e76f51, #f4a261); }

  .fg-title { flex: 1; }
  .fg-title .name { font-size: 15px; font-weight: 600; }
  .fg-title .meta { font-size: 12px; color: #888; margin-top: 2px; }

  .fg-badges { display: flex; gap: 6px; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge.multi { background: #fff3e0; color: #e65100; }
  .badge.multilevel { background: #e8f5e9; color: #2e7d32; }

  .chevron { font-size: 18px; color: #999; transition: transform 0.3s; flex-shrink: 0; }
  .fg-card.expanded .chevron { transform: rotate(90deg); }

  .fg-body { display: none; padding: 0 20px 20px; }
  .fg-card.expanded .fg-body { display: block; }

  .bom-version { margin-top: 12px; }
  .bom-version-header { font-size: 13px; font-weight: 600; color: #0f3460; margin-bottom: 8px; padding: 6px 10px; background: #f0f4f8; border-radius: 6px; display: flex; justify-content: space-between; }

  .tree { padding-left: 0; }
  .tree-node { position: relative; padding-left: 28px; margin: 2px 0; }
  .tree-node::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 50%; border-left: 1.5px solid #d0d0d0; }
  .tree-node::after { content: ''; position: absolute; left: 8px; top: 50%; width: 14px; border-top: 1.5px solid #d0d0d0; }
  .tree-node:last-child::before { bottom: 50%; }

  .tree-node-content { display: inline-flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: default; transition: background 0.15s; }
  .tree-node-content:hover { background: #f5f5f5; }

  .node-icon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .node-icon.raw { background: #2a9d8f; }
  .node-icon.sub { background: #e76f51; }

  .node-id { font-weight: 600; color: #555; min-width: 32px; }
  .node-name { color: #333; }
  .node-qty { color: #888; font-size: 12px; }

  .sub-expand { cursor: pointer; color: #e76f51; font-weight: 500; }
  .sub-expand:hover { text-decoration: underline; }

  .sub-children { display: none; margin-left: 28px; padding: 4px 0 4px 12px; border-left: 2px solid #f4a261; }
  .sub-children.visible { display: block; }

  .sub-bom-label { font-size: 11px; color: #e76f51; font-weight: 600; margin: 6px 0 2px; }

  .legend { display: flex; gap: 20px; padding: 16px 20px; background: #f8f9fa; border-top: 1px solid #eee; font-size: 12px; color: #666; align-items: center; margin-top: 20px; border-radius: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }

  .empty-state { text-align: center; padding: 60px; color: #999; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>

let currentTab = 'all';

function hasSubAssembly(versions) {
  for (const v of versions) {
    for (const c of v.components) {
      if (c.type === 'sub_assembly') return true;
    }
  }
  return false;
}

function renderTree(components, depth = 0) {
  let html = '';
  for (const comp of components) {
    const isSub = comp.type === 'sub_assembly';
    const iconClass = isSub ? 'sub' : 'raw';
    const qtyStr = comp.qty !== null && comp.qty !== undefined ? `x${comp.qty}` : '';
    const uid = `node_${Math.random().toString(36).substr(2,9)}`;

    html += `<div class="tree-node">`;
    html += `<div class="tree-node-content">`;
    html += `<div class="node-icon ${iconClass}"></div>`;
    html += `<span class="node-id">${comp.id}</span>`;
    html += `<span class="node-name">${comp.name}</span>`;
    html += `<span class="node-qty">${qtyStr}</span>`;

    if (isSub && comp.bom_versions && comp.bom_versions.length > 0) {
      html += ` <span class="sub-expand" onclick="toggleSub('${uid}')">[+]</span>`;
    }
    html += `</div>`;

    if (isSub && comp.bom_versions && comp.bom_versions.length > 0) {
      html += `<div class="sub-children" id="${uid}">`;
      for (const sv of comp.bom_versions) {
        html += `<div class="sub-bom-label">BOM: ${sv.bom_cd} (${sv.bom_tx})</div>`;
        html += renderTree(sv.components, depth + 1);
      }
      html += `</div>`;
    }

    html += `</div>`;
  }
  return html;
}

function renderCard(fg) {
  const isTop = fg.is_top_level;
  const iconClass = isTop ? 'top' : 'sub';
  const hasSub = hasSubAssembly(fg.bom_versions);
  const hasMulti = fg.bom_versions.length > 1;

  let badges = '';
  if (hasMulti) badges += `<span class="badge multi">${fg.bom_versions.length} BOMs</span>`;
  if (hasSub) badges += `<span class="badge multilevel">Multi-Level</span>`;

  const totalComps = fg.bom_versions.reduce((s, v) => s + v.components.length, 0);

  let bodyHtml = '';
  for (const v of fg.bom_versions) {
    bodyHtml += `<div class="bom-version">`;
    bodyHtml += `<div class="bom-version-header"><span>BOM: ${v.bom_cd}</span><span>${v.bom_tx} &mdash; ${v.components.length} components</span></div>`;
    bodyHtml += `<div class="tree">${renderTree(v.components)}</div>`;
    bodyHtml += `</div>`;
  }

  return `
    <div class="fg-card" data-fg="${fg.fg_code}" data-type="${isTop ? 'top' : 'sub'}" data-multilevel="${hasSub}" data-search="${fg.fg_code} ${fg.fg_name} ${fg.bom_versions.map(v => v.bom_cd + ' ' + v.bom_tx + ' ' + v.components.map(c => c.id + ' ' + c.name).join(' ')).join(' ')}">
      <div class="fg-header" onclick="toggleCard(this)">
        <div class="fg-icon ${iconClass}">${fg.fg_code}</div>
        <div class="fg-title">
          <div class="name">${fg.fg_name}</div>
          <div class="meta">${fg.bom_versions.length} BOM version${fg.bom_versions.length > 1 ? 's' : ''} &middot; ${totalComps} component entries</div>
        </div>
        <div class="fg-badges">${badges}</div>
        <div class="chevron">&#9654;</div>
      </div>
      <div class="fg-body">${bodyHtml}</div>
    </div>
  `;
}

function renderAll() {
  const allFGs = [...bomData.top_level, ...bomData.sub_assemblies];
  let html = '';
  for (const fg of allFGs) {
    html += renderCard(fg);
  }

  html += `<div class="legend">
    <strong>Legend:</strong>
    <div class="legend-item"><div class="node-icon raw" style="width:10px;height:10px;border-radius:50%;background:#2a9d8f;"></div> Raw Material</div>
    <div class="legend-item"><div class="node-icon sub" style="width:10px;height:10px;border-radius:50%;background:#e76f51;"></div> Sub-Assembly (click [+] to expand)</div>
  </div>`;

  document.getElementById('content').innerHTML = html;

  document.getElementById('stat-fg').textContent = bomData.stats.total_fgs;
  document.getElementById('stat-sub').textContent = bomData.stats.sub_assembly_count;

  const rawItems = new Set();
  const allComps = [...bomData.top_level, ...bomData.sub_assemblies];
  for (const fg of allComps) {
    for (const v of fg.bom_versions) {
      for (const c of v.components) {
        if (c.type === 'raw_material') rawItems.add(c.id);
      }
    }
  }
  document.getElementById('stat-raw').textContent = rawItems.size;
}

function toggleCard(header) {
  header.parentElement.classList.toggle('expanded');
}

function toggleSub(id) {
  const el = document.getElementById(id);
  el.classList.toggle('visible');
  const btn = el.previousElementSibling.querySelector('.sub-expand');
  if (btn) btn.textContent = el.classList.contains('visible') ? '[-]' : '[+]';
}

function expandAll() {
  document.querySelectorAll('.fg-card:not(.hidden)').forEach(c => c.classList.add('expanded'));
}

function collapseAll() {
  document.querySelectorAll('.fg-card').forEach(c => c.classList.remove('expanded'));
  document.querySelectorAll('.sub-children').forEach(c => {
    c.classList.remove('visible');
    const btn = c.previousElementSibling?.querySelector('.sub-expand');
    if (btn) btn.textContent = '[+]';
  });
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.fg-card').forEach(card => {
    if (!q) { card.classList.remove('hidden'); applyTabFilter(card); return; }
    const searchText = card.dataset.search.toLowerCase();
    const match = searchText.includes(q);
    card.classList.toggle('hidden', !match);
    if (match) applyTabFilter(card);
  });
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.fg-card').forEach(card => applyTabFilter(card));
  filterCards();
}

function applyTabFilter(card) {
  if (card.classList.contains('hidden')) return;
  const type = card.dataset.type;
  const multi = card.dataset.multilevel === 'true';
  let show = true;
  if (currentTab === 'top') show = type === 'top';
  else if (currentTab === 'sub') show = type === 'sub';
  else if (currentTab === 'multi') show = multi;
  card.classList.toggle('hidden', !show);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderAll);
} else {
  renderAll();
}
</script>

</body>
</html>
